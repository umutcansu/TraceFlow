name: Publish TraceFlow

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-runtime:
    name: Publish Runtime → Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d > /tmp/secring.gpg

      - name: Publish to Maven Central
        run: ./gradlew :runtime:publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}

  publish-gradle-plugin:
    name: Publish Gradle Plugin → Plugin Portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gradle-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish to Gradle Plugin Portal
        run: ./gradlew publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

  publish-studio-plugin:
    name: Publish Studio Plugin → JetBrains Marketplace
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studio-plugin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish to JetBrains Marketplace
        run: ./gradlew publishPlugin
        env:
          JAVA_TOOL_OPTIONS: "-Duser.language=en -Duser.country=US"
          ORG_GRADLE_PROJECT_ORG_JETBRAINS_INTELLIJ_PLATFORM_PUBLISH_TOKEN: ${{ secrets.JETBRAINS_PUBLISH_TOKEN }}
